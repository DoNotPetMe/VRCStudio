<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="vGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="60%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="dotGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="35%" stop-color="#7dd3fc" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: rounded dark square -->
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="url(#bg)"/>

  <!-- Subtle inner highlight ring -->
  <rect x="2" y="2" width="252" height="252" rx="55" ry="55" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="2"/>

  <!-- The "V" — chevron, drawn as a thick stroke -->
  <g filter="url(#glow)">
    <path d="M 60 70 L 128 192 L 196 70"
          fill="none"
          stroke="url(#vGrad)"
          stroke-width="26"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <!-- Center pulse dot (presence indicator) -->
  <circle cx="128" cy="120" r="34" fill="url(#dotGlow)" opacity="0.65"/>
  <circle cx="128" cy="120" r="9" fill="#ffffff"/>

  <!-- Concentric arcs above the V (radio waves / OSC vibe) -->
  <g stroke="#7dd3fc" fill="none" stroke-linecap="round" opacity="0.55">
    <path d="M 88 78 Q 128 50 168 78" stroke-width="3.5"/>
    <path d="M 76 64 Q 128 28 180 64" stroke-width="2.5" opacity="0.6"/>
  </g>
</svg>
